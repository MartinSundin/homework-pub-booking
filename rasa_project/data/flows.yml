  #   2. If validation_error is set → utter_booking_rejected, end.
  #   3. Otherwise → set booking_reference, utter_booking_confirmed, end.
  # ─────────────────────────────────────────────────────────────────
  confirm_booking:
    description: Confirm a new pub booking after validation.
    steps:
      - action: action_validate_booking
      # TODO: add branch on validation_error slot.
      # TODO: on success, generate a booking_reference (e.g. 'BK-<hash>')
      #       and utter_booking_confirmed.

  # ─────────────────────────────────────────────────────────────────
  # resume_from_loop — re-entry point when the loop half hands off.
  #
  # Entry: user sends /resume_from_loop (triggered programmatically
  # by RasaStructuredHalf after it receives a forward-handoff).
  #
  # Steps:
  #   1. Echo the received booking data back for confirmation.
  #   2. Jump into the confirm_booking flow.
  # ─────────────────────────────────────────────────────────────────
  resume_from_loop:
    description: Resume booking confirmation when handed off from the loop half.
    steps:
      # TODO: collect required slots if any are missing, then link to confirm_booking.
